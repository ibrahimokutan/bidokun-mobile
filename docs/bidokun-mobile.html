<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>bidokun mobile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        .material-symbols-outlined.fill {
            font-variation-settings:
                'FILL' 1,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">
    <!-- Header Section -->
    <div
        class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 pt-12 pb-4">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white" style="">bidokun</h1>
            <button
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-400"
                style="">
                <span class="material-symbols-outlined" style="">notifications</span>
            </button>
        </div>
        <!-- Search Bar -->
        <div class="relative group">
            <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                <span class="material-symbols-outlined" style="">search</span>
            </div>
            <input
                class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 py-3 pl-10 pr-4 text-sm placeholder-slate-400 focus:border-primary focus:ring-1 focus:ring-primary dark:text-white transition-shadow shadow-sm"
                placeholder="Kartları ara..." type="text">
        </div>
    </div>
    <!-- Main Content: Vertical List -->
    <main class="flex-1 px-4 py-6 space-y-4 pb-24 overflow-y-auto">
        <!-- Section Header -->
        <div class="flex items-center justify-between px-1">
            <h2 class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider" style="">
                kartlarım</h2>
            <button class="text-primary hover:text-primary/80 text-sm font-semibold flex items-center gap-1" style="">
                <span class="material-symbols-outlined" style="font-size: 18px;">add</span> Yeni Ekle
            </button>
        </div>
        <!-- Card Item 1: Primary Work -->
        <div
            class="group relative overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 shadow-sm hover:shadow-md hover:border-primary/50 transition-all duration-200 cursor-pointer">
            <div class="flex items-center justify-between mb-8">
                <div
                    class="flex items-center gap-1 text-slate-300 dark:text-slate-600 group-hover:text-primary transition-colors">
                    <span class="material-symbols-outlined" style="">contactless</span>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-xs font-semibold text-primary uppercase tracking-wider" style="">kurumsal</span>
                <h3 class="text-lg font-bold text-slate-900 dark:text-white" style="">İbrahim Okutan</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400" style="">Founder & CEO</p>
            </div>
            <!-- Decorative gradient blob -->
            <div
                class="absolute -right-12 -bottom-12 w-32 h-32 bg-primary/10 rounded-full blur-2xl group-hover:bg-primary/20 transition-colors">
            </div>
        </div>
        <!-- Card Item 2: Personal -->
        <div
            class="group relative overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 shadow-sm hover:shadow-md hover:border-primary/50 transition-all duration-200 cursor-pointer">
            <div class="flex items-center justify-between mb-8">
                <div
                    class="flex items-center gap-1 text-slate-300 dark:text-slate-600 group-hover:text-primary transition-colors">
                    <span class="material-symbols-outlined" style="">contactless</span>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider" style="">bireysel</span>
                <h3 class="text-lg font-bold text-slate-900 dark:text-white" style="">Ahmet Nebi</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400" style="">Translator</p>
            </div>
        </div>
    </main>
    <!-- Bottom Navigation -->
    <!-- Safe area spacing for iOS home indicator -->
    <div class="h-6 w-full bg-white dark:bg-slate-900"></div>
</body>

</html>
